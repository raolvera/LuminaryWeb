backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "theme"
        label: "Theme & Colors"
        file: "content/theme.json"
        fields:
          - label: "Font Family"
            name: "font_family"
            widget: "select"
            options:
              - {label: "Arial (Current)", value: "Arial, sans-serif"}
              - {label: "Georgia", value: "Georgia, serif"}
              - {label: "Times New Roman", value: "'Times New Roman', serif"}
              - {label: "Helvetica", value: "Helvetica, sans-serif"}
              - {label: "Verdana", value: "Verdana, sans-serif"}
              - {label: "Courier New", value: "'Courier New', monospace"}
              - {label: "Playfair Display", value: "'Playfair Display', serif"}
              - {label: "Roboto", value: "'Roboto', sans-serif"}
              - {label: "Open Sans", value: "'Open Sans', sans-serif"}
              - {label: "Lato", value: "'Lato', sans-serif"}
            default: "Arial, sans-serif"

          - label: "Global Colors"
            name: "global"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Header Background Color", name: "header_bg", widget: "color", default: "#000000"}
              - {label: "Header Logo Color", name: "header_logo_color", widget: "color", default: "#A7977E"}
              - {label: "Header Logo Star Color", name: "header_logo_star_color", widget: "color", default: "#EDE8E1"}
              - {label: "Accent Color (Hover / Highlights)", name: "accent_color", widget: "color", default: "#FFD700"}
              - {label: "Border Color", name: "border_color", widget: "color", default: "#333333"}
              - {label: "Footer Background Color", name: "footer_bg", widget: "color", default: "#4c444e"}
              - {label: "Footer Logo Color", name: "footer_logo_color", widget: "color", default: "#A7977E"}
              - {label: "Footer Logo Star Color", name: "footer_logo_star_color", widget: "color", default: "#EDE8E1"}
              - {label: "Footer Text Color", name: "footer_text", widget: "color", default: "#ffffff"}

          - label: "Home Page Colors"
            name: "home"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Our Story Section - Background Color", name: "story_bg", widget: "color", default: "#FFFAEC"}
              - {label: "Our Story Section - Text Color", name: "story_text", widget: "color", default: "#000000"}
              - {label: "Chef Philosophy Section - Background Color", name: "chef_bg", widget: "color", default: "#e0e0e0"}
              - {label: "Chef Philosophy Section - Text Color", name: "chef_text", widget: "color", default: "#000000"}
              - {label: "Menu Section - Background Color", name: "menu_bg", widget: "color", default: "#000000"}
              - {label: "Menu Section - Text Color", name: "menu_text", widget: "color", default: "#ffffff"}

          - label: "About Page (Our Story) Colors"
            name: "about"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Banner Background Color", name: "banner_bg", widget: "color", default: "#333333"}
              - {label: "Banner Text Color", name: "banner_text", widget: "color", default: "#ffffff"}
              - {label: "Our Story Section - Background Color", name: "story_bg", widget: "color", default: "#f4f4f4"}
              - {label: "Our Story Section - Text Color", name: "story_text", widget: "color", default: "#000000"}
              - {label: "Chef Philosophy Section - Background Color", name: "chef_bg", widget: "color", default: "#e0e0e0"}
              - {label: "Chef Philosophy Section - Text Color", name: "chef_text", widget: "color", default: "#000000"}

          - label: "Menu Page Colors"
            name: "menu"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Banner Background Color", name: "banner_bg", widget: "color", default: "#333333"}
              - {label: "Banner Text Color", name: "banner_text", widget: "color", default: "#ffffff"}
              - {label: "Section Background Color", name: "bg", widget: "color", default: "#000000"}
              - {label: "Section Text Color", name: "text", widget: "color", default: "#ffffff"}
              - {label: "Category Name Color", name: "category_color", widget: "color", default: "#ffffff"}
              - {label: "Description Text Color", name: "desc_color", widget: "color", default: "#aaaaaa"}
              - {label: "Menu Item Price Color", name: "price_color", widget: "color", default: "#FFD700"}
              - {label: "Navigation Arrow Color", name: "arrow_color", widget: "color", default: "#ffffff"}
              - {label: "Carousel Dot Color", name: "dot_color", widget: "color", default: "#ffffff"}

          - label: "Private Events Page Colors"
            name: "events"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Banner Background Color", name: "banner_bg", widget: "color", default: "#333333"}
              - {label: "Banner Text Color", name: "banner_text", widget: "color", default: "#ffffff"}
              - {label: "Private Dining Section - Background Color", name: "private_bg", widget: "color", default: "#f4f4f4"}
              - {label: "Private Dining Section - Text Color", name: "private_text", widget: "color", default: "#000000"}
              - {label: "Event Hosting Section - Background Color", name: "hosting_bg", widget: "color", default: "#e0e0e0"}
              - {label: "Event Hosting Section - Text Color", name: "hosting_text", widget: "color", default: "#000000"}

          - label: "Book a Table Page Colors"
            name: "book"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Banner Background Color", name: "banner_bg", widget: "color", default: "#333333"}
              - {label: "Banner Text Color", name: "banner_text", widget: "color", default: "#ffffff"}
              - {label: "Section Background Color", name: "section_bg", widget: "color", default: "#e0e0e0"}
              - {label: "Form Background Color", name: "form_bg", widget: "color", default: "#fffaec"}
              - {label: "Form Text Color", name: "form_text", widget: "color", default: "#000000"}
              - {label: "Button Background Color", name: "button_bg", widget: "color", default: "#000000"}
              - {label: "Button Text Color", name: "button_text", widget: "color", default: "#ffffff"}
              - {label: "Input / Dropdown Background Color", name: "input_bg", widget: "color", default: "#ffffff"}
              - {label: "Input / Dropdown Text Color", name: "input_text", widget: "color", default: "#000000"}
              - {label: "Input / Dropdown Border Color", name: "input_border", widget: "color", default: "#cccccc"}
              - {label: "Calendar / Time Picker Background", name: "picker_bg", widget: "color", default: "#ffffff"}
              - {label: "Calendar / Time Picker Text Color", name: "picker_text", widget: "color", default: "#000000"}
              - {label: "Calendar Today Highlight Background", name: "calendar_today_bg", widget: "color", default: "#999999"}
              - {label: "Calendar Today Highlight Text", name: "calendar_today_text", widget: "color", default: "#ffffff"}

          - label: "Confirmation Page Colors"
            name: "confirmation"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Banner Background Color", name: "banner_bg", widget: "color", default: "#333333"}
              - {label: "Banner Text Color", name: "banner_text", widget: "color", default: "#ffffff"}
              - {label: "Section Background Color", name: "section_bg", widget: "color", default: "#906057"}
              - {label: "Card Background Color", name: "card_bg", widget: "color", default: "#f4f4f4"}
              - {label: "Card Text Color", name: "card_text", widget: "color", default: "#000000"}
              - {label: "Icon Background Color", name: "icon_bg", widget: "color", default: "#000000"}
              - {label: "Icon Text Color", name: "icon_text", widget: "color", default: "#ffffff"}
              - {label: "Home Button Background", name: "home_btn_bg", widget: "color", default: "#ffffff"}
              - {label: "Home Button Text", name: "home_btn_text", widget: "color", default: "#000000"}
              - {label: "Rebook Button Background", name: "rebook_btn_bg", widget: "color", default: "#000000"}
              - {label: "Rebook Button Text", name: "rebook_btn_text", widget: "color", default: "#ffffff"}
              - {label: "Favicon Color (Confirmation Only)", name: "favicon_color", widget: "color", default: "#B87333"}

  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/home.json"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Description", name: "hero_description", widget: "text"}
          - {label: "Hero Image", name: "hero_image", widget: "image"}
          - {label: "Story Title", name: "story_title", widget: "string"}
          - {label: "Story Paragraph", name: "story_text", widget: "text"}
          - {label: "Story Video", name: "story_video", widget: "file", required: false, hint: "Upload a video (.mp4). Leave empty to display the Story Image instead."}
          - {label: "Story Image", name: "story_image", widget: "image", required: false, hint: "Displayed if no Story Video is provided above."}
          - {label: "Chef Philosophy Title", name: "chef_title", widget: "string"}
          - {label: "Chef Philosophy Paragraph", name: "chef_text", widget: "text"}
          - {label: "Chef Video", name: "chef_video", widget: "file", required: false, hint: "Upload a video (.mp4) to replace the Chef Image with a video player."}
          - {label: "Chef Image", name: "chef_image", widget: "image", hint: "Displayed if no Chef Video is provided above."}

      - name: "about"
        label: "About Page"
        file: "content/about.json"
        fields:
          - {label: "Hero Image", name: "hero_image", widget: "image"}
          - {label: "Page Title", name: "page_title", widget: "string"}
          - {label: "Story Title", name: "story_title", widget: "string"}
          - {label: "Story Paragraph 1", name: "story_text_1", widget: "text"}
          - {label: "Story Paragraph 2", name: "story_text_2", widget: "text"}
          - {label: "Story Video", name: "story_video", widget: "file", required: false, hint: "Upload a video (.mp4). Leave empty to display the Story Image instead."}
          - {label: "Story Image", name: "story_image", widget: "image", hint: "Also used as fallback if no Story Video is provided."}
          - {label: "Story Paragraph 3", name: "story_text_3", widget: "text"}
          - {label: "Story Paragraph 4", name: "story_text_4", widget: "text"}
          - {label: "Chef Philosophy Title", name: "chef_title", widget: "string"}
          - {label: "Chef Philosophy Paragraph 1", name: "chef_text_1", widget: "text"}
          - {label: "Chef Philosophy Paragraph 2", name: "chef_text_2", widget: "text"}
          - {label: "Chef Video", name: "chef_video", widget: "file", required: false, hint: "Upload a video (.mp4) to replace the Chef Image with a video player."}
          - {label: "Chef Image", name: "chef_image", widget: "image", hint: "Displayed if no Chef Video is provided above."}
          - {label: "Chef Philosophy Paragraph 3", name: "chef_text_3", widget: "text"}
          - {label: "Chef Philosophy Paragraph 4", name: "chef_text_4", widget: "text"}

      - name: "events"
        label: "Events Page"
        file: "content/events.json"
        fields:
          - {label: "Hero Image", name: "hero_image", widget: "image"}
          - {label: "Page Title", name: "page_title", widget: "string"}
          - {label: "Private Dining Title", name: "private_title", widget: "string"}
          - {label: "Private Dining Paragraph 1", name: "private_text_1", widget: "text"}
          - {label: "Private Dining Paragraph 2", name: "private_text_2", widget: "text"}
          - {label: "Private Dining Image", name: "private_image", widget: "image"}
          - {label: "Event Hosting Title", name: "hosting_title", widget: "string"}
          - {label: "Event Hosting Paragraph 1", name: "hosting_text_1", widget: "text"}
          - {label: "Event Hosting Paragraph 2", name: "hosting_text_2", widget: "text"}
          - {label: "Event Hosting Image", name: "hosting_image", widget: "image", required: false}

      - name: "menu-page"
        label: "Menu Page"
        file: "content/menu-page.json"
        fields:
          - {label: "Hero Image", name: "hero_image", widget: "image", required: false}
          - {label: "Page Title", name: "page_title", widget: "string"}
          - {label: "Menu Section Heading", name: "carousel_heading", widget: "string", required: false, hint: "Optional heading displayed above the menu categories. Leave empty to hide."}

      - name: "book-page"
        label: "Book a Table Page"
        file: "content/book-page.json"
        fields:
          - {label: "Hero Image", name: "hero_image", widget: "image", required: false}
          - {label: "Page Title", name: "page_title", widget: "string"}

      - name: "confirmation-page"
        label: "Confirmation Page"
        file: "content/confirmation-page.json"
        fields:
          - {label: "Hero Image", name: "hero_image", widget: "image", required: false}
          - {label: "Page Title", name: "page_title", widget: "string"}

      - name: "menu-categories"
        label: "Menu Category Descriptions"
        file: "content/menu-categories.json"
        fields:
          - {label: "Appetizers Description 1", name: "appetizers_desc_1", widget: "text"}
          - {label: "Appetizers Description 2", name: "appetizers_desc_2", widget: "text"}
          - {label: "Appetizers Description 3", name: "appetizers_desc_3", widget: "text"}
          - {label: "Appetizers Description 4", name: "appetizers_desc_4", widget: "text"}
          - {label: "Desserts Description 1", name: "desserts_desc_1", widget: "text"}
          - {label: "Desserts Description 2", name: "desserts_desc_2", widget: "text"}
          - {label: "Desserts Description 3", name: "desserts_desc_3", widget: "text"}
          - {label: "Desserts Description 4", name: "desserts_desc_4", widget: "text"}
          - {label: "Entrees Description 1", name: "entrees_desc_1", widget: "text"}
          - {label: "Entrees Description 2", name: "entrees_desc_2", widget: "text"}
          - {label: "Entrees Description 3", name: "entrees_desc_3", widget: "text"}
          - {label: "Entrees Description 4", name: "entrees_desc_4", widget: "text"}
          - {label: "Beverages Description 1", name: "beverages_desc_1", widget: "text"}
          - {label: "Beverages Description 2", name: "beverages_desc_2", widget: "text"}
          - {label: "Beverages Description 3", name: "beverages_desc_3", widget: "text"}
          - {label: "Beverages Description 4", name: "beverages_desc_4", widget: "text"}
          - {label: "Cocktails Description 1", name: "cocktails_desc_1", widget: "text"}
          - {label: "Cocktails Description 2", name: "cocktails_desc_2", widget: "text"}
          - {label: "Cocktails Description 3", name: "cocktails_desc_3", widget: "text"}
          - {label: "Cocktails Description 4", name: "cocktails_desc_4", widget: "text"}

  - name: "menu"
    label: "Menu Items"
    folder: "content/menu"
    create: true
    format: "json"
    extension: "json"
    identifier_field: "name"
    summary: "{{category}} - {{name}} (${{price}})"
    slug: "{{category}}-{{slug}}"
    fields:
      - {label: "Category", name: "category", widget: "select", options: ["Appetizers", "Desserts", "Entrees", "Beverages", "Cocktails"]}
      - {label: "Item Name", name: "name", widget: "string"}
      - {label: "Price", name: "price", widget: "number", value_type: "int", min: 1}
      - {label: "Menu Description", name: "description", widget: "text"}
      - {label: "Menu Item Image", name: "image", widget: "image"}
      - {label: "Order", name: "order", widget: "number", default: 0, value_type: "int"}
